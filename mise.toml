[vars]
BUILD_OUTPUT_DIR = "build/{{os()}}/"
vet = "-vet-style"
target = ""
optimize = "aggressive"
collections = "-collection:ecs=src/ecs -collection:logging=src/logging -collection:reflect=src/reflect -collection:benchmark=src/benchmark -collection:libs=vendor -collection:os_geri=src/os -collection:specs=src/specs -collection:transform=src/transform -collection:camera=src/camera -collection:fps=src/fps -collection:input=src/input -collection:ui=src/ui"
build_lib_win = "-build-mode:dll -o:{{vars.optimize}} -out:{{vars.BUILD_OUTPUT_DIR}}{{config_root | basename}}.dll"
build_lib_other = "-build-mode:dll -o:{{vars.optimize}} -out:{{vars.BUILD_OUTPUT_DIR}}{{config_root | basename}}.so"
test = "-all-packages -o:{{vars.optimize}} -define:ODIN_TEST_THREADS=1 "  # -define:ODIN_TEST_FANCY=false"

[tasks.test]
quiet = true
depends = ["build-odin", "install-odpkg", "copy_vendor_libs"]
run = [
  { task = "make_build" },
  "odin test . {{vars.vet}} {{vars.target}} {{vars.test}} -out:{{vars.BUILD_OUTPUT_DIR}}test_runner.exe",
]

[tasks.test-ui]
description = "Run the UI and Input layout showcase on the main thread"
interactive = true
depends = ["build-odin", "copy_vendor_libs"]
run = [
  { task = "make_build" },
  "odin run test_ui {{vars.vet}} {{vars.target}} -o:{{vars.optimize}} -out:{{vars.BUILD_OUTPUT_DIR}}test_ui.exe -- 10s",
]

[tasks.test-ui-3d]
description = "Run the sphere-mapped UI canvas showcase on the main thread"
interactive = true
depends = ["build-odin", "copy_vendor_libs"]
run = [
  { task = "make_build" },
  "odin run test_ui_3d {{vars.vet}} {{vars.target}} -o:{{vars.optimize}} -out:{{vars.BUILD_OUTPUT_DIR}}test_ui_3d.exe",
]

[tasks.test-render]
description = "Run the graphics render pipeline test on the main thread"
interactive = true
depends = ["build-odin", "copy_vendor_libs"]
run = [
  { task = "make_build" },
  "odin run test_render {{vars.vet}} {{vars.target}} -o:{{vars.optimize}} -out:{{vars.BUILD_OUTPUT_DIR}}test_render.exe -- 10s",
]

[tasks.test-shader]
description = "Run the graphics shader pass and compute pipeline test on the main thread"
interactive = true
depends = ["build-odin", "copy_vendor_libs"]
run = [
  { task = "make_build" },
  "odin run test_shader {{vars.vet}} {{vars.target}} -o:{{vars.optimize}} -out:{{vars.BUILD_OUTPUT_DIR}}test_shader.exe -debug",
]

[tasks.bench]
interactive = true
# quiet = true
env = { BENCH_FORMAT = "{{ env.BENCH_FORMAT | default(value='markdown;graph') }}" }
depends = ["build-odin", "install-odpkg", "copy_vendor_libs"]
run = [
  { task = "make_build" },
  "odin test benches {{vars.vet}} {{vars.target}} {{vars.test}} -out:{{vars.BUILD_OUTPUT_DIR}}bench_runner.exe",
]

[tasks.build]
quiet = true
run = [
  { task = "make_build" },
  { task = "copy_vendor_libs" },
  "odin build . {{vars.vet}} {{vars.target}} {{vars.build_lib_other}}",
]
run_windows = [
  { task = "make_build" },
  { task = "copy_vendor_libs" },
  "odin build . {{vars.vet}} {{vars.target}} {{vars.build_lib_win}}",
]

[tasks.clean]
interactive = true
quiet = true
silent = true
run = ["rm -rf build/"]

[tasks.make_build]
quiet = true
silent = true
depends = "clean"
run = "mkdir -p {{vars.BUILD_OUTPUT_DIR}}"
run_windows = "powershell -Command \"New-Item -ItemType Directory -Force '{{vars.BUILD_OUTPUT_DIR}}' | Out-Null\""
hide = true

[tasks.update_deps]
depends = ["build-odin", "install-odpkg"]
hide = true
quiet = true
run = """
  if [ -f "./odpkg.toml" ]; then
    odpkg update
  fi
"""
run_windows = """
powershell -c "
if (touch -c "./odpkg.toml") { odpkg update }
"
"""

[tasks.build-odin]
description = "Build Odin vendor libraries (STB)"
quiet = true
run = """
ODIN_ROOT=$(dirname $(which odin))
if [ -f "$ODIN_ROOT/vendor/stb/lib/stb_sprintf.a" ]; then
  echo "=> STB vendor libraries already built, skipping."
  exit 0
fi
echo "=> Building STB vendor libraries in $ODIN_ROOT/vendor/stb/src..."
make -C "$ODIN_ROOT/vendor/stb/src"
echo "=> Done!"
"""
run_windows = ""

[tasks.install-odpkg]
description = "Install odpkg from GitHub and build it"
interactive = true
quiet = true
run = """
if command -v odpkg &> /dev/null; then
  echo "=> odpkg already installed, skipping."
  exit 0
fi
echo "=> Installing build dependencies libcurl4-openssl-dev and zlib1g-dev (requires sudo)..."
sudo apt-get install -y libcurl4-openssl-dev zlib1g-dev
TMP_DIR=$(mktemp -d)
echo "=> Cloning odpkg..."
git clone https://github.com/bymehul/odpkg "$TMP_DIR"
echo "=> Building odpkg..."
odin build "$TMP_DIR/src" -out:"$TMP_DIR/odpkg" -o:speed -extra-linker-flags:"-L/lib/x86_64-linux-gnu"
echo "=> Installing to /usr/bin..."
sudo mv "$TMP_DIR/odpkg" /usr/bin/odpkg
rm -rf "$TMP_DIR"
echo "=> Done! odpkg installed successfully."
"""
run_windows = """
powershell -c "
  if (Get-Command odpkg -ErrorAction SilentlyContinue) {
    Write-Host '=> odpkg already installed, skipping.'
    exit 0
  }
  $TmpDir = Join-Path $env:TEMP ('odpkg-' + (Get-Random))
  Write-Host '=> Cloning odpkg...'
  git clone https://github.com/bymehul/odpkg $TmpDir
  Write-Host '=> Building odpkg...'
  odin build (Join-Path $TmpDir 'src') -out:(Join-Path $TmpDir 'odpkg.exe') -o:speed
  $OdinDir = Split-Path (Get-Command odin).Source
  Write-Host '=> Installing to' $OdinDir
  Move-Item (Join-Path $TmpDir 'odpkg.exe') (Join-Path $OdinDir 'odpkg.exe') -Force
  Remove-Item -Recurse -Force $TmpDir
  Write-Host '=> Done! odpkg installed successfully.'
"
"""

[tasks.copy_vendor_libs]
description = "Copy OS-specific dynamic libraries from Odin's vendor directory"
quiet = true
depends = "make_build"
run = "bash scripts/copy_vendor_libs.sh {{vars.BUILD_OUTPUT_DIR}}"
run_windows = "powershell -File scripts/copy_vendor_libs.ps1 {{vars.BUILD_OUTPUT_DIR}}"
